<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Landing Page</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            line-height: 1.6;
        }

        /* Navbar */
        header {
            background: #333;
            color: #fff;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
        }

        nav a:hover {
            color: #00adb5;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            background: linear-gradient(to right, #00adb5, #393e46);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            margin-bottom: 20px;
        }

        .hero button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: #333;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        .hero button:hover {
            background: #ddd;
        }

        /* Features */
        .features {
            padding: 50px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .feature {
            max-width: 250px;
        }

        .feature h3 {
            margin-bottom: 10px;
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1>MySite</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Features</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome to My Website</h2>
        <p>Create something amazing with simple code</p>
        <button>Get Started</button>
    </section>

    <!-- Features -->
    <section class="features">
        <div class="feature">
            <h3>Fast</h3>
            <p>Quick and responsive design</p>
        </div>
        <div class="feature">
            <h3>Simple</h3>
            <p>Easy to understand and use</p>
        </div>
        <div class="feature">
            <h3>Free</h3>
            <p>Deploy it anywhere for free</p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 MySite | All Rights Reserved</p>
    </footer>

</body>
</html>
